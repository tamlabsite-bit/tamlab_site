<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | Limitless Survivors</title>
    <style>
      #unity-container {
        position: relative;
        display: inline-block;
        width: 1366px;
        height: 768px;
        background: #231F20;
      }
      #custom-loader {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 10;
        font-family: sans-serif;
        font-size: 24px;
        font-weight: bold;
        color: white;
        animation: pulse 2s infinite;
        pointer-events: none;
      }
      @keyframes pulse {
        0% { color: white; }
        50% { color: #808080; }
        100% { color: white; }
      }
      #loader-bar-container {
        width: 200px;
        height: 4px;
        background: #444;
        margin-top: 10px;
        border-radius: 2px;
        overflow: hidden;
      }
      #loader-bar-fill {
        width: 10%;
        height: 100%;
        background: white;
        transition: width 0.2s ease-out;
      }
    </style>
  </head>
  <body style="text-align: center; padding: 0; border: 0; margin: 0;">
    <div id="unity-container">
      <canvas id="unity-canvas" width=1366 height=768 tabindex="-1" style="width: 1366px; height: 768px; background: #231F20"></canvas>
      <div id="custom-loader">
        <div>LOADING</div>
        <div id="loader-bar-container">
          <div id="loader-bar-fill"></div>
        </div>
      </div>
    </div>
    <script src="Build/test_WEBRUN.loader.js"></script>
    <script>
      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        // Mobile device style: fill the whole browser client area with the game canvas:
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);

        var container = document.querySelector("#unity-container");
        var canvas = document.querySelector("#unity-canvas");
        container.style.width = "100%";
        container.style.height = "100%";
        container.style.position = "fixed";
        canvas.style.width = "100%";
        canvas.style.height = "100%";

        document.body.style.textAlign = "left";

      }

      console.log("Unity Instance Creation Started...");
      createUnityInstance(document.querySelector("#unity-canvas"), {
        arguments: [],
        dataUrl: "Build/test_WEBRUN.data",
        frameworkUrl: "Build/test_WEBRUN.framework.js",
        codeUrl: "Build/test_WEBRUN.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Tam Lab",
        productName: "Limitless Survivors",
        productVersion: "0.9",
      }, (progress) => {
        console.log("Unity Loading Progress: " + progress);
        const displayProgress = Math.min(progress / 0.95, 1);
        document.querySelector("#loader-bar-fill").style.width = 100 * displayProgress + "%";
      }).then((unityInstance) => {
        document.querySelector("#custom-loader").style.display = "none";
      }).catch((message) => {
        alert(message);
      });
    </script>
  </body>
</html>
